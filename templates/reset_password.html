<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Job Search Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:  #f5f0e8;
            --white:  #fdfcfa;
            --ink:    #1a1814;
            --ink2:   #2e2b26;
            --muted:  #6b6560;
            --dim:    #a09890;
            --border: #ddd8d0;
            --accent: #c84b2f;
        }
        body { background: var(--white); font-family: 'DM Sans', sans-serif; color: var(--ink); margin: 0; }
        h2 { font-family: 'Syne', sans-serif; }
        label { display: block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
        input[type="password"] {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 4px;
            background: var(--white); color: var(--ink); font-size: 14px; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.18s; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); }
        .btn { display: block; width: 100%; padding: 11px; border-radius: 4px; border: none;
            background: var(--ink); color: var(--white); font-family: 'DM Mono', monospace;
            font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; transition: background 0.18s; }
        .btn:hover { background: var(--ink2); }
        .alert-error { background: rgba(200,75,47,0.08); border: 1px solid rgba(200,75,47,0.25); color: var(--accent); padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; }
        .hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;">
        <div style="width:100%;max-width:400px;">

            <!-- Logo -->
            <div style="text-align:center;margin-bottom:36px;">
                <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--ink);">DW<span style="color:var(--accent);">.</span></span>
                <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:6px;">Job Search Platform</p>
            </div>

            <!-- Card -->
            <div style="background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:32px;">
                <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">Choose new password</h2>
                <p style="font-size:13px;color:var(--muted);margin-bottom:24px;">Pick a strong password you haven't used before.</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endwith %}

                <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div style="margin-bottom:16px;">
                        <label for="password">New password</label>
                        <input type="password" id="password" name="password" autocomplete="new-password" required
                               oninput="checkStrength(this.value)">
                        <p class="hint" id="strength-hint">Min. 8 characters</p>
                    </div>

                    <div style="margin-bottom:24px;">
                        <label for="confirm_password">Confirm new password</label>
                        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
                    </div>

                    <button type="submit" class="btn">Set new password</button>
                </form>
            </div>

            <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
                <a href="{{ url_for('login') }}">← Back to sign in</a>
            </p>
        </div>
    </div>

    <script>
        function checkStrength(val) {
            const hint = document.getElementById('strength-hint');
            if (val.length === 0) {
                hint.style.color = 'var(--dim)';
                hint.textContent = 'Min. 8 characters';
            } else if (val.length < 8) {
                hint.style.color = 'var(--accent)';
                hint.textContent = `${8 - val.length} more character${8 - val.length === 1 ? '' : 's'} needed`;
            } else {
                hint.style.color = '#2d7a4f';
                hint.textContent = 'Good';
            }
        }
    </script>
</body>
</html>
